              - heading [level=2] [ref=e1580]:
                - text: Thought Signatures
                - link "Direct link to Thought Signatures" [ref=e1581] [cursor=pointer]:
                  - /url: "#thought-signatures"
                  - text: "#"
              - paragraph [ref=e1582]: Thought signatures are encrypted representations of the model's internal reasoning process for a given turn in a conversation. By passing thought signatures back to the model in subsequent requests, you provide it with the context of its previous thoughts, allowing it to build upon its reasoning and maintain a coherent line of inquiry.
              - paragraph [ref=e1583]: Thought signatures are particularly important for multi-turn function calling scenarios where the model needs to maintain context across multiple tool invocations.
              - heading [level=3] [ref=e1584]:
                - text: How Thought Signatures Work
                - link "Direct link to How Thought Signatures Work" [ref=e1585] [cursor=pointer]:
                  - /url: "#how-thought-signatures-work"
                  - text: "#"
              - list [ref=e1586]:
                - listitem [ref=e1587]:
                  - strong [ref=e1588]: Function calls with signatures
                  - text: ": When Gemini returns a function call, it includes a"
                  - code [ref=e1589]: thought_signature
                  - text: in the response
                - listitem [ref=e1590]:
                  - strong [ref=e1591]: Preservation
                  - text: ": LiteLLM automatically extracts and stores thought signatures in"
                  - code [ref=e1592]: provider_specific_fields
                  - text: of tool calls
                - listitem [ref=e1593]:
                  - strong [ref=e1594]: Return in conversation history
                  - text: ": When you include the assistant's message with tool calls in subsequent requests, LiteLLM automatically preserves and returns the thought signatures to Gemini"
                - listitem [ref=e1595]:
                  - strong [ref=e1596]: Parallel function calls
                  - text: ": Only the first function call in a parallel set has a thought signature"
                - listitem [ref=e1597]:
                  - strong [ref=e1598]: Sequential function calls
                  - text: ": Each function call in a multi-step sequence has its own signature"
              - heading [level=3] [ref=e1599]:
