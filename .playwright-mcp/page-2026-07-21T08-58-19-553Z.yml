                - link "Direct link to Important Notes" [ref=e1706] [cursor=pointer]:
                  - /url: "#important-notes"
                  - text: "#"
              - list [ref=e1707]:
                - listitem [ref=e1708]:
                  - paragraph [ref=e1709]:
                    - strong [ref=e1710]: Automatic Handling
                    - text: ": LiteLLM automatically extracts thought signatures from Gemini responses and preserves them when you include assistant messages in conversation history. You don't need to manually extract or manage them."
                - listitem [ref=e1711]:
                  - paragraph [ref=e1712]:
                    - strong [ref=e1713]: Parallel Function Calls
                    - text: ": When the model makes parallel function calls, only the first function call will have a thought signature. Subsequent parallel calls won't have signatures."
                - listitem [ref=e1714]:
                  - paragraph [ref=e1715]:
                    - strong [ref=e1716]: Sequential Function Calls
                    - text: ": In multi-step function calling scenarios, each step's first function call will have its own thought signature that must be preserved."
                - listitem [ref=e1717]:
                  - paragraph [ref=e1718]:
                    - strong [ref=e1719]: Required for Context
                    - text: ": Thought signatures are essential for maintaining reasoning context across multi-turn conversations with function calling. Without them, the model may lose context of its previous reasoning."
                - listitem [ref=e1720]:
                  - paragraph [ref=e1721]:
                    - strong [ref=e1722]: Format
                    - text: ": Thought signatures are stored in"
                    - code [ref=e1723]: provider_specific_fields.thought_signature
                    - text: of tool calls in the response, and are automatically included when you append the assistant message to your conversation history.
                - listitem [ref=e1724]:
                  - paragraph [ref=e1725]:
                    - strong [ref=e1726]: Chat Completions Clients
                    - text: ": With chat completions clients where you cannot control whether or not the previous assistant message is included as-is (ex langchain's ChatOpenAI), LiteLLM also preserves the thought signature by appending it to the tool call id ("
                    - code [ref=e1727]: call_123__thought__<thought-signature>
                    - text: ) and extracting it back out before sending the outbound request to Gemini.
