                      - generic [ref=e1653]: "\"properties\": {\"location\": {\"type\": \"string\"}},"
                      - generic [ref=e1654]: "\"required\": [\"location\"],"
                      - generic [ref=e1655]: "},"
                      - generic [ref=e1656]: "}"
                      - generic [ref=e1657]: "set_thermostat_declaration = {"
