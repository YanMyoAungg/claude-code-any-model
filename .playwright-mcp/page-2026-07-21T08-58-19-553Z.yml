              - heading [level=3] [ref=e1626]:
                - text: Multi-Turn Function Calling with Thought Signatures
                - link "Direct link to Multi-Turn Function Calling with Thought Signatures" [ref=e1627] [cursor=pointer]:
                  - /url: "#multi-turn-function-calling-with-thought-signatures"
                  - text: "#"
              - paragraph [ref=e1628]: When building conversation history for multi-turn function calling, you must include the thought signatures from previous responses. LiteLLM handles this automatically when you append the full assistant message to your conversation history.
              - generic [ref=e1629]:
                - tablist [ref=e1630]:
