                - listitem [ref=f2e1841]:
                  - strong [ref=f2e1842]: Responses API Only
                  - text: ": GPT-5 Pro is only available through the"
                  - code [ref=f2e1843]: /v1/responses
                  - text: endpoint
                - listitem [ref=f2e1844]:
                  - strong [ref=f2e1845]: No Streaming
                  - text: ": Does not support streaming responses"
                - listitem [ref=f2e1846]:
                  - strong [ref=f2e1847]: High Reasoning
                  - text: ": Designed for complex reasoning tasks with highest effort reasoning"
                - listitem [ref=f2e1848]:
                  - strong [ref=f2e1849]: Context Window
                  - text: ": 400,000 tokens input, 272,000 tokens output"
                - listitem [ref=f2e1850]:
                  - strong [ref=f2e1851]: Pricing
                  - text: ": $15.00 input / $120.00 output per 1M tokens (Standard), $7.50 input / $60.00 output (Batch)"
                - listitem [ref=f2e1852]:
                  - strong [ref=f2e1853]: Tools
                  - text: ": Supports Web Search, File Search, Image Generation, MCP (but not Code Interpreter or Computer Use)"
                - listitem [ref=f2e1854]:
                  - strong [ref=f2e1855]: Modalities
                  - text: ": Text and Image input, Text output only"
