              - heading [level=2] [ref=f2e922]:
                - text: "[BETA] Route all .completions requests to Responses API (better quality)"
                - link "Direct link to [BETA] Route all .completions requests to Responses API (better quality)" [ref=f2e923] [cursor=pointer]:
                  - /url: "#beta-route-all-completions-requests-to-responses-api-better-quality"
                  - text: "#"
              - paragraph [ref=f2e924]:
                - text: When enabled, LiteLLM sends OpenAI traffic from
                - code [ref=f2e925]: litellm.completion()
                - text: and the proxy
                - code [ref=f2e926]: /chat/completions
                - text: endpoint through the
                - link "Responses API" [ref=f2e927] [cursor=pointer]:
                  - /url: https://platform.openai.com/docs/api-reference/responses
                - text: instead of Chat Completions. That path generally matches OpenAI’s latest model behavior and quality (for example, reasoning output on GPT‑5 class models).
              - paragraph [ref=f2e928]: "You can opt in globally or per request:"
              - paragraph [ref=f2e929]:
                - strong [ref=f2e930]: "Option A — per-request prefix:"
                - text: Use the
                - code [ref=f2e931]: openai/responses/
                - text: model prefix.
              - paragraph [ref=f2e932]:
                - strong [ref=f2e933]: "Option B — global flag (recommended):"
                - text: Set
                - code [ref=f2e934]: route_all_chat_openai_to_responses = True
                - text: to automatically route all OpenAI
                - code [ref=f2e935]: /chat/completions
                - text: requests through the Responses API, no model prefix needed.
              - generic [ref=f2e936]:
                - tablist [ref=f2e937]:
                  - tab "SDK - Global Flag" [selected] [ref=f2e938] [cursor=pointer]
                  - tab "PROXY - Global Flag" [ref=f2e939] [cursor=pointer]
                - tabpanel [ref=f2e941]:
                  - code [ref=f2e945]:
                    - generic [ref=f2e946]: import litellm
                    - generic [ref=f2e947]: litellm.route_all_chat_openai_to_responses = True
                    - generic [ref=f2e948]: response = litellm.completion(
                    - generic [ref=f2e949]: model="gpt-5.4",
                    - generic [ref=f2e950]: "messages=[{\"role\": \"user\", \"content\": \"What is the capital of France?\"}],"
                    - generic [ref=f2e951]: reasoning_effort="low",
                    - generic [ref=f2e952]: )
              - generic [ref=f2e953]:
                - generic [ref=f2e954]: note
                - paragraph [ref=f2e959]:
                  - code [ref=f2e960]: route_all_chat_openai_to_responses
                  - text: only applies to the
                  - code [ref=f2e961]: openai
                  - text: "provider. Azure OpenAI is unaffected. You can also set it via env var:"
                  - code [ref=f2e962]: LITELLM_ROUTE_ALL_CHAT_OPENAI_TO_RESPONSES=true
                  - text: .
