# ┌─────────────────────────────────────────────────────────────────┐
# │ Docker Compose — one command LiteLLM proxy for Claude Code       │
# │                                                                  │
# │ Usage:                                                           │
# │   1. cp .env.example .env                                        │
# │   2. Edit .env → add your API key + choose model                 │
# │   3. docker compose up                                           │
# │                                                                  │
# │ No config file needed — everything comes from .env               │
# └─────────────────────────────────────────────────────────────────┘

services:
  litellm:
    build: .
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      # ── Model ──────────────────────────────────────────────────
      LITELLM_MODEL: ${LITELLM_MODEL:-deepseek/deepseek-v4-pro}
      LITELLM_MODEL_NAME: ${LITELLM_MODEL_NAME:-deepseek-v4-pro}
      # ── Provider API keys (set the one you use) ────────────────
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # ── Generic / fallback ─────────────────────────────────────
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_API_BASE: ${LITELLM_API_BASE:-}
      # ── Optional: master key for admin UI ──────────────────────
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      # ── Port ───────────────────────────────────────────────────
      LITELLM_PORT: ${LITELLM_PORT:-4000}
    restart: unless-stopped
